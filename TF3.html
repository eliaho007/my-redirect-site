<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThaiFriendly Redirect</title>
  <script>
    function popper() {
      // קבלת שם המשתמש מה־URL
      const params = new URLSearchParams(window.location.search);
      const username = params.keys().next().value; // משתמש בשם הפרמטר עצמו (למשל ?Sky382 => Sky382)
      
      if (!username) {
        alert("No username provided in URL!");
        return;
      }

      // בדיקה אם המשתמש רוצה להשתמש באפליקציה
      if (window.localStorage.getItem('useapp') == 1) {
        // הפניה לאפליקציה עם המשתמש החדש + x הקבוע
        window.location.href = 'thaifriendly://prof=' + username + '&x=4187468';
      } else {
        // אם לא, אפשר להפנות לאתר (רק דוגמה)
        window.location.href = 'https://www.thaifriendly.com/profile/' + username;
      }
    }

    // קרא לפונקציה כשנטען העמוד
    window.onload = popper;
  </script>
</head>
<body>
  <p>Redirecting to ThaiFriendly profile...</p>
</body>
</html>
