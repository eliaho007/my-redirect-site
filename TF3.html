<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThaiFriendly Redirect</title>
  <script>
    function popper() {
      // הגדרת useapp ל-1
      window.localStorage.setItem('useapp','1');

      // קבלת שם המשתמש מה-URL
      const params = new URLSearchParams(window.location.search);
      const username = params.keys().next().value; // ?Sky382 => Sky382

      if (!username) {
        alert("No username provided in URL!");
        return;
      }

      // הפניה ישירה לאפליקציה עם המשתמש + x הקבוע
      window.location.href = 'thaifriendly://prof=' + username + '&x=4187468';
    }

    // קרא לפונקציה כשנטען העמוד
    window.onload = popper;
  </script>
</head>
<body>
  <p>Redirecting to ThaiFriendly profile...</p>
</body>
</html>
