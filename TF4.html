<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThaiFriendly Redirect</title>

<script>
function popper() {

  // תמיד להפעיל שימוש באפליקציה
  window.localStorage.setItem('useapp','1');

  // קבלת שם המשתמש מה־URL
  // עובד עם:
  // ?Sky382
  // ?username=Sky382
  let username = "";

  const query = window.location.search.substring(1);

  if (query.includes("=")) {
      const params = new URLSearchParams(window.location.search);
      username = params.values().next().value;
  } else {
      username = query;
  }

  if (!username) return;

  // ⭐ הדבר היחיד שבאמת צריך
  window.location.href =
      'thaifriendly://prof=' + username + '&x=4187468';
}

// הפעלה מיד כשהדף נטען
window.onload = popper;
</script>

<style>
/* מסתיר לגמרי את הדף כדי שלא יראו "כוכב" */
html,body{
  margin:0;
  background:#000;
  height:100%;
}
</style>

</head>
<body>
</body>
</html>
