<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThaiFriendly Direct Open</title>
<script>
function getUsernameFromURL() {
    // שולף את הפרמטר אחרי ה־?
    const params = window.location.search.substring(1);
    return params ? params : null;
}

function openThaiFriendly() {
    const username = getUsernameFromURL();
    if (!username) return;

    // שומר ב־localStorage שהמשתמש רוצה את האפליקציה
    window.localStorage.setItem('useapp', '1');

    // URL של האפליקציה עם x קבוע
    window.location.href = 'thaifriendly://prof=' + username + '&x=4187468';
}

window.onload = openThaiFriendly;
</script>
</head>
<body>
<p>Opening ThaiFriendly profile...</p>
</body>
</html>
