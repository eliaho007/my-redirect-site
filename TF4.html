<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open ThaiFriendly App</title>
<script>
function openProfile() {
    // קבלת המשתמש מה־query string
    const params = new URLSearchParams(window.location.search);
    const user = params.keys().next().value; // מקבל את המפתח הראשון, לדוגמה Sky382
    if (!user) return;

    // שמירת useapp
    window.localStorage.setItem('useapp', '1');

    // הפניה ישירה לאפליקציה עם x קבוע
    window.location.href = 'thaifriendly://prof=' + user + '&x=4187468';
}

// מריץ מיד עם טעינת הדף
window.onload = openProfile;
</script>
<style>
/* מוסיף רק רקע שחור כדי למנוע כוכב בולט */
body {
    margin: 0;
    height: 100vh;
    background: #000;
}
</style>
</head>
<body>
</body>
</html>
