<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ThaiFriendly Redirect</title>
<script>
// קבלת שם המשתמש מה-URL
const params = new URLSearchParams(window.location.search);
let profile = null;

// קח את הפרמטר הראשון ב-URL (למשל ?Sky382)
for (const key of params.keys()) {
    profile = key;
    break;
}

if(!profile){
    document.body.innerHTML = "No profile specified in URL.";
} else {
    // זיהוי אם זה סלולרי או מחשב
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){
        // הפניה ישירה לאפליקציה עם x הקבוע
        window.location.href = 'thaifriendly://prof=' + profile + '&x=4187468';
    } else {
        // הפניה לאתר למחשבים
        window.location.href = 'https://www.thaifriendly.com/' + profile;
    }
}
</script>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
