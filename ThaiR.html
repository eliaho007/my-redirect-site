<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ThaiFriendly Auto Open</title>
<script>
// פונקציה לקרוא פרמטר מה-URL
function getUsernameFromURL() {
    let params = new URLSearchParams(window.location.search);
    // נשמור את הפרמטר הראשון (Guitar546)
    return params.keys().next().value;
}

// פונקציה לפתוח את הפרופיל
function openProfile() {
    let user = getUsernameFromURL();
    if(user) {
        // נפתח HTTPS → Chrome → App
        window.location.href = "https://www.thaifriendly.com/" + user;
    } else {
        document.body.innerHTML = "<h2>לא הוזן שם משתמש ב-URL</h2>";
    }
}

window.onload = openProfile;
</script>
</head>
<body>
<h2>טוען פרופיל...</h2>
</body>
</html>
