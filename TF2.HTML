<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ThaiFriendly App Opener</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #b9dbff;
  color: #333;
  text-align: center;
  padding: 20px;
}
.profile-button {
  display: block;
  width: 90%;
  margin: 8px auto;
  padding: 12px;
  font-size: 16px;
  background: #77baff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.profile-button:hover {
  background: #5599ee;
}
</style>
</head>
<body>

<h2>ThaiFriendly App Opener</h2>
<div id="result"></div>

<script>
// פונקציה ליצירת כפתור שמנסה גם intent:// וגם thaifriendly://
function createButton(username) {
    let btnApp = document.createElement("button");
    btnApp.innerHTML = "Open in ThaiFriendly App: " + username;
    btnApp.className = "profile-button useapp";

    btnApp.onclick = function() {
        // קודם ניסיון עם intent://
        let intentUrl = 'intent://prof=' + username + '#Intent;scheme=thaifriendly;package=com.thaifriendly.app;end';
        let tfUrl = 'thaifriendly://prof=' + username;

        // ניסיון לפתוח intent://
        window.location.href = intentUrl;

        // בזמן קצר, אם לא הצליח, נסה את thaifriendly://
        setTimeout(function(){
            window.location.href = tfUrl;
        }, 500); // מחכה חצי שנייה
    };

    document.getElementById("result").appendChild(btnApp);
}

// קבלת פרמטר profile מה-URL
const params = new URLSearchParams(window.location.search);
const profile = params.get('profile');

if(profile){
    createButton(profile);
}
</script>

</body>
</html>
